{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ titulo }} – Dr. Cabello{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="h3 mb-0 text-gray-800"><i class="fas fa-users-cog mr-2 text-primary"></i>{{ titulo }}</h1>
  <a href="{% url 'usuarios:lista' %}" class="btn btn-secondary btn-sm"><i class="fas fa-arrow-left mr-1"></i> Volver</a>
</div>
<div class="card shadow mb-4">
  <div class="card-header py-3"><h6 class="m-0 font-weight-bold text-primary">Datos del Usuario</h6></div>
  <div class="card-body">
    <form method="post" novalidate>
      {% csrf_token %}
      {% crispy form %}
      <hr>
      <button type="submit" class="btn btn-primary"><i class="fas fa-save mr-1"></i> Guardar</button>
      <a href="{% url 'usuarios:lista' %}" class="btn btn-secondary ml-2">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
