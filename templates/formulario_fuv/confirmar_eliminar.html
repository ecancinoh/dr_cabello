{% extends 'base.html' %}
{% block title %}{{ titulo }} – Dr. Cabello{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="h3 mb-0 text-gray-800 text-danger"><i class="fas fa-exclamation-triangle mr-2"></i>{{ titulo }}</h1>
</div>
<div class="card shadow border-left-danger mb-4">
  <div class="card-body">
    <p class="lead">¿Confirma eliminar esta evaluación de salud?</p>
    <p class="text-muted"><strong>Evaluación:</strong> {{ objeto }}</p>
    <hr>
    <form method="post">{% csrf_token %}
      <button type="submit" class="btn btn-danger"><i class="fas fa-trash mr-1"></i> Confirmar</button>
      <a href="{% url 'formulario_fuv:lista' %}" class="btn btn-secondary ml-2">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
